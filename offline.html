<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لا يوجد اتصال بالإنترنت | Quill</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 45, 116, 0.08);
            max-width: 400px;
            width: 85%;
            border-top: 6px solid #00839b;
        }
        .icon-wrapper {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px auto;
            background-color: #f1f5f9;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #00839b;
        }
        /* أيقونة واي فاي مقطوع مدمجة كـ SVG لتعمل أوفلاين */
        .icon-wrapper svg {
            width: 45px;
            height: 45px;
            fill: #002d74;
        }
        h1 {
            color: #002d74;
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 800;
        }
        p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        button {
            background-color: #00839b;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        button:hover {
            background-color: #006b80;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 131, 155, 0.2);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.88 4.11a1 1 0 0 0-1.36-.06l-2.6 2.08a1 1 0 0 0 1.24 1.56l1.24-1-.54 1.7a1 1 0 1 0 1.9.6l.8-2.5a1 1 0 0 0-.68-2.38zm-19.5 0a1 1 0 0 0-.68 2.38l.8 2.5a1 1 0 1 0 1.9-.6l-.54-1.7 1.24 1a1 1 0 1 0 1.24-1.56l-2.6-2.08a1 1 0 0 0-1.36.06zM12 8.5a4.5 4.5 0 0 0-4.5 4.5 1 1 0 0 0 2 0 2.5 2.5 0 0 1 5 0 1 1 0 0 0 2 0 4.5 4.5 0 0 0-4.5-4.5zm0 4.5a1.5 1.5 0 1 0 1.5 1.5A1.5 1.5 0 0 0 12 13zM1.2 1.2a1 1 0 0 0 0 1.41l19.6 19.6a1 1 0 0 0 1.41-1.41L2.61 1.2a1 1 0 0 0-1.41 0z"/>
            </svg>
        </div>
        <h1>انقطع الاتصال بالشبكة</h1>
        <p>عذراً، يبدو أنك فقدت الاتصال بالإنترنت. يرجى التحقق من الشبكة وإعادة المحاولة للعودة إلى مساحة عمل Quill.</p>
        <button onclick="window.location.reload()">تحديث الصفحة</button>
    </div>
</body>
</html>
